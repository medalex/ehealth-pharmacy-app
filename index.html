<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pharmacy System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f5f5f5; font-size:.92rem; }
    .topbar { background:#37474f; color:#fff; padding:.65rem 1.4rem; display:flex; align-items:center; gap:.8rem; }
    .topbar h1 { font-size:1.05rem; margin:0; font-weight:600; }
    .wrap { max-width:1100px; margin:0 auto; padding:1.4rem; }
    .panel { background:#fff; border-radius:8px; border:1px solid #dde3ea; margin-bottom:1.2rem; overflow:hidden; }
    .panel-head { background:#f5f6f7; border-bottom:1px solid #dde3ea; padding:.5rem 1rem; font-weight:600; font-size:.84rem; color:#37474f; display:flex; justify-content:space-between; align-items:center; }
    .panel-body { padding:1rem; }
    label { font-size:.82rem; font-weight:500; }
    .mono { font-family:monospace; font-size:.75rem; }
    table { font-size:.82rem; }
    .s-Received  { background:#fff3cd; color:#856404; }
    .s-Verified  { background:#d4edda; color:#155724; }
    .s-Dispensed { background:#cce5ff; color:#004085; }
    .s-Rejected  { background:#f8d7da; color:#721c24; }
    .sbadge { font-size:.72rem; padding:.2em .55em; border-radius:3px; font-weight:600; }
    .pass { color:#155724; font-weight:700; }
    .fail { color:#721c24; font-weight:700; }
    .toast-wrap { position:fixed; bottom:1rem; right:1rem; z-index:9999; display:flex; flex-direction:column; gap:.4rem; }
  </style>
</head>
<body>
<div class="topbar">
  <span>💊</span>
  <h1>Pharmacy Dispensing System</h1>
  <span class="ms-auto opacity-75 small">eHealth Demo · Pharmacy API :3004</span>
</div>

<div class="wrap">

  <!-- QUEUE -->
  <div class="panel">
    <div class="panel-head">
      Dispensing Queue
      <button class="btn btn-outline-secondary btn-sm" onclick="loadRx()">↻ Refresh</button>
    </div>
    <div class="panel-body p-0">
      <table class="table table-hover table-sm mb-0">
        <thead class="table-light">
          <tr><th>Received</th><th>Drug</th><th>Dosage</th><th>Patient</th><th>ZKP</th><th>Status</th><th style="width:200px">Actions</th></tr>
        </thead>
        <tbody id="rx-list"></tbody>
      </table>
    </div>
  </div>

  <!-- MANUAL RECEIVE (fallback) -->
  <details class="panel">
    <summary class="panel-head" style="cursor:pointer;list-style:none">
      ▸ Manual receive (if hospital UI is unavailable)
    </summary>
    <div class="panel-body">
      <p class="text-muted small mb-2">Use when hospital sends prescription data out-of-band (copy-paste from hospital UI).</p>
      <div class="row g-2">
        <div class="col-sm-2">
          <label>Drug</label>
          <select id="r-drug" class="form-select form-select-sm">
            <option value="101">101 Ibuprofen</option>
            <option value="102">102 Aspirin</option>
            <option value="103">103 Penicillin</option>
            <option value="104">104 Paracetamol</option>
          </select>
        </div>
        <div class="col-sm-1"><label>Dosage</label><input id="r-dose" class="form-control form-control-sm" value="8 mg"></div>
        <div class="col-sm-3"><label>Patient ID</label><input id="r-pid" class="form-control form-control-sm" placeholder="UUID"></div>
        <div class="col-sm-2"><label>ZKP outcome</label>
          <select id="r-outcome" class="form-select form-select-sm"><option value="true">PASS</option><option value="false">FAIL</option></select>
        </div>
      </div>
      <div class="row g-2 mt-1">
        <div class="col-sm-4"><label>stmtHash</label><input id="r-stmt" class="form-control form-control-sm mono"></div>
        <div class="col-sm-4"><label>proofJson</label><input id="r-proof" class="form-control form-control-sm mono" placeholder='{"pi_a":[...],...}'></div>
        <div class="col-sm-4"><label>publicSignalsJson</label><input id="r-sig" class="form-control form-control-sm mono" placeholder='["1","743..."]'></div>
      </div>
      <button class="btn btn-secondary btn-sm mt-2" onclick="manualReceive()">Receive</button>
      <div id="r-msg" class="mt-2"></div>
    </div>
  </details>

</div>

<div class="toast-wrap" id="toasts"></div>

<script>
const API   = 'http://localhost:3004';
const DRUGS = {101:'Ibuprofen',102:'Aspirin',103:'Penicillin',104:'Paracetamol'};

const get  = p => fetch(API+p).then(r=>r.json());
const post = (p,b=null) => fetch(API+p,{method:'POST',headers:{'Content-Type':'application/json'},...(b?{body:JSON.stringify(b)}:{})}).then(async r=>{if(!r.ok)throw new Error(await r.text());return r.json();});
const flash = (id,html,t='success') => document.getElementById(id).innerHTML=`<div class="alert alert-${t} p-2 small mb-0">${html}</div>`;

function toast(text, type='success'){
  const el=document.createElement('div');
  el.className=`alert alert-${type} p-2 small shadow`;
  el.style='min-width:260px';
  el.textContent=text;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

async function loadRx(){
  const rows = await get('/api/prescriptions');
  document.getElementById('rx-list').innerHTML = rows.length
    ? rows.map(r=>{
        const canV = r.status==='Received';
        const canD = r.status==='Verified';
        const zkp  = r.outcome===true?'<span class="pass">✓ PASS</span>':r.outcome===false?'<span class="fail">✗ FAIL</span>':'<span class="text-muted">—</span>';
        return `<tr>
          <td>${new Date(r.receivedAt).toLocaleString()}</td>
          <td>${r.drugName||DRUGS[r.drugId]||r.drugId}</td>
          <td>${r.dosage}</td>
          <td class="mono" title="${r.patientId}">${r.patientId?.slice(0,8)}…</td>
          <td>${zkp}</td>
          <td><span class="sbadge s-${r.status}">${r.status}</span></td>
          <td>
            ${canV?`<button class="btn btn-warning btn-sm me-1" onclick="verify('${r.id}')">Verify ZKP</button>`:''}
            ${canD?`<button class="btn btn-success btn-sm" onclick="dispense('${r.id}')">Dispense</button>`:''}
            ${r.status==='Dispensed'?'<span class="text-success small">✓ Done</span>':''}
            ${r.status==='Rejected'?'<span class="text-danger small">✗ Rejected</span>':''}
          </td>
        </tr>`;
      }).join('')
    : '<tr><td colspan="7" class="text-center text-muted py-3">Queue is empty — waiting for prescriptions from hospital</td></tr>';
}

async function verify(id){
  try{
    const res=await post(`/api/prescriptions/${id}/verify`);
    toast(res.verified?'✓ ZKP proof verified':'✗ ZKP verification failed', res.verified?'success':'danger');
    loadRx();
  }catch(e){toast(e.message,'danger');}
}

async function dispense(id){
  try{
    await post(`/api/prescriptions/${id}/dispense`);
    toast('Prescription dispensed ✓');
    loadRx();
  }catch(e){toast(e.message,'danger');}
}

async function manualReceive(){
  try{
    const drugId=parseInt(document.getElementById('r-drug').value);
    const r=await post('/api/prescriptions/receive',{
      drugId, drugName:DRUGS[drugId]||'Unknown',
      dosage:document.getElementById('r-dose').value,
      patientId:document.getElementById('r-pid').value,
      stmtHash:document.getElementById('r-stmt').value||'',
      proofJson:document.getElementById('r-proof').value||'{}',
      publicSignalsJson:document.getElementById('r-sig').value||'[]',
      outcome:document.getElementById('r-outcome').value==='true',
    });
    flash('r-msg',`Received — ID: <code>${r.id}</code>`);
    loadRx();
  }catch(e){flash('r-msg',e.message,'danger');}
}

loadRx();
setInterval(loadRx, 10000); // auto-refresh every 10s
</script>
</body>
</html>
